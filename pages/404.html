<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | AromaLux</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
<text y='50' font-size='50'>🧴</text>
</svg>">
    <style>
        .perfume-bottle {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
    </style>
</head>
<body class="antialiased bg-gradient-to-br from-yellow-50 via-white to-pink-50 min-h-screen flex items-center justify-center p-4">
    
    <div class="text-center max-w-2xl">
        <!-- Animated Perfume Bottle -->
        <div class="perfume-bottle mb-8">
            <i class="fas fa-spray-can text-9xl text-yellow-600 opacity-50"></i>
        </div>
        
        <!-- 404 Number -->
        <h1 class="text-8xl md:text-9xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-600 to-yellow-400 mb-4">
            404
        </h1>
        
        <!-- Error Message -->
        <h2 class="text-3xl md:text-4xl font-bold mb-4">Oops! Page Not Found</h2>
        <p class="text-xl text-gray-600 mb-8">
            The page you're looking for seems to have evaporated like a delicate fragrance in the wind.
        </p>
        
        <!-- CTA Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="index.html" class="btn-luxury">
                <i class="fas fa-home mr-2"></i>Back to Home
            </a>
            <a href="shop.html" class="btn-outline-luxury">
                <i class="fas fa-shopping-bag mr-2"></i>Browse Shop
            </a>
        </div>
        
        <!-- Helpful Links -->
        <div class="mt-12 grid md:grid-cols-3 gap-4 text-left">
            <a href="about.html" class="bg-white p-4 rounded-lg shadow-md hover:shadow-lg transition-shadow">
                <i class="fas fa-info-circle text-yellow-600 mb-2"></i>
                <h3 class="font-semibold">About Us</h3>
                <p class="text-sm text-gray-600">Learn our story</p>
            </a>
            <a href="contact.html" class="bg-white p-4 rounded-lg shadow-md hover:shadow-lg transition-shadow">
                <i class="fas fa-envelope text-yellow-600 mb-2"></i>
                <h3 class="font-semibold">Contact</h3>
                <p class="text-sm text-gray-600">Get in touch</p>
            </a>
            <a href="blog.html" class="bg-white p-4 rounded-lg shadow-md hover:shadow-lg transition-shadow">
                <i class="fas fa-blog text-yellow-600 mb-2"></i>
                <h3 class="font-semibold">Blog</h3>
                <p class="text-sm text-gray-600">Read articles</p>
            </a>
        </div>
        
        <!-- Search Bar -->
        <div class="mt-12">
            <p class="text-gray-600 mb-4">Or try searching:</p>
            <div class="max-w-md mx-auto">
                <input type="text" placeholder="Search for products..." class="input-luxury" onkeypress="handleSearch(event)">
            </div>
        </div>
    </div>
    
    <script src="../assets/js/main.js"></script>
</body>
</html>
