<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AromaLux</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
<text y='50' font-size='50'>🧴</text>
</svg>">
</head>
<body class="antialiased bg-gradient-to-br from-yellow-50 via-white to-pink-50 min-h-screen flex items-center justify-center p-4">
    
    <div class="max-w-md w-full">
        <div class="auth-intro text-center mb-8">
            <a href="index.html" class="inline-flex items-center space-x-2 mb-6">
                <i class="fas fa-spray-can text-4xl text-yellow-600"></i>
                <span class="text-3xl font-bold font-serif text-gray-900">AromaLux</span>
            </a>
            <h1 class="text-3xl font-bold mb-2 text-gray-900">Welcome Back</h1>
            <p class="text-gray-600">Sign in to your account</p>
        </div>
        
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <form id="loginForm" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Email Address</label>
                    <input type="email" required class="input-luxury" placeholder="your@email.com">
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Password</label>
                    <input type="password" required class="input-luxury" placeholder="••••••••">
                </div>
                
                <div class="flex items-center justify-between mb-6">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" class="mr-2">
                        <span class="text-sm text-gray-600">Remember me</span>
                    </label>
                    <a href="#" class="text-sm text-yellow-600 hover:underline">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn-luxury w-full mb-6">Sign In</button>
            </form>
            
            <div class="relative mb-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-white text-gray-500">Or continue with</span>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <button class="flex items-center justify-center px-4 py-3 border-2 border-gray-300 rounded-lg hover:border-yellow-500 transition-colors">
                    <i class="fab fa-google text-red-500 mr-2"></i>
                    <span class="text-sm font-medium">Google</span>
                </button>
                <button class="flex items-center justify-center px-4 py-3 border-2 border-gray-300 rounded-lg hover:border-yellow-500 transition-colors">
                    <i class="fab fa-facebook-f text-blue-600 mr-2"></i>
                    <span class="text-sm font-medium">Facebook</span>
                </button>
            </div>
            
            <p class="text-center text-gray-600">
                Don't have an account? 
                <a href="register.html" class="text-yellow-600 font-semibold hover:underline">Sign up</a>
            </p>
        </div>
        
        <p class="auth-outside-text text-center mt-6 text-sm text-gray-600">
            <a href="index.html" class="hover:text-yellow-600"><i class="fas fa-arrow-left mr-2"></i>Back to Home</a>
        </p>
    </div>
    
    <script src="../assets/js/main.js"></script>
</body>
</html>
